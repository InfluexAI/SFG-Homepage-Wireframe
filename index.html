  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"9db2f81d-70c2-4f0b-904c-510c396c284b\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *, *::before, *::after { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"background:#eceae6;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#2b2b29;-webkit-font-smoothing:antialiased;\">\n\n  <!-- WIREFRAME BANNER -->\n  <div style=\"background:#2b2b29;color:#cfcdc4;padding:9px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;font:600 11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;\">\n    <span>Wireframe · Skrobonja Financial Group / Homepage · AEO-Updated Copy<\u002Fspan>\n    <span style=\"color:#8a8a80;\">Layout &amp; copy flow only · Not brand styled<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- CLIENT COVER NOTE -->\n  <section data-screen-label=\"Cover Note\" style=\"background:#23231f;border-bottom:1px solid #1a1a17;\">\n    <div style=\"max-width:1000px;margin:0 auto;padding:88px 32px 80px;\">\n      <div style=\"font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.2em;text-transform:uppercase;color:#a8a69d;margin-bottom:28px;\">Wireframe Review · AEO-Updated Copy<\u002Fdiv>\n      <h1 style=\"font:700 clamp(30px,3.6vw,46px)/1.12 system-ui;letter-spacing:-.015em;margin:0 0 24px;color:#fff;max-width:24ch;text-wrap:balance;\">Skrobonja Financial Group Homepage<\u002Fh1>\n      <p style=\"font:400 19px/1.65 system-ui;color:#cdcbc2;margin:0 0 36px;max-width:64ch;\">This is a structural wireframe. It shows the page's sections, hierarchy, and how the copy flows from one idea to the next. It is intentionally unstyled so the focus stays on rhythm and cadence, not visuals.<\u002Fp>\n      <p style=\"font:400 16px/1.65 system-ui;color:#a8a69d;margin:0 0 44px;max-width:66ch;\">This version maps the AEO-updated copy. Alongside the locked page copy, it places the new AI-citation text blocks in their specified positions and flags the pre-launch developer requirements. A legend below shows how each is marked.<\u002Fp>\n\n      <!-- AEO LEGEND -->\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px;\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;border:1px solid #33332d;border-radius:8px;padding:16px;\">\n          <span style=\"flex:none;width:14px;height:14px;border-radius:3px;background:#6f6e66;margin-top:2px;\"><\u002Fspan>\n          <div><div style=\"font:700 11px/1.3 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#cdcbc2;margin-bottom:5px;\">Locked Copy<\u002Fdiv><div style=\"font:400 13px/1.5 system-ui;color:#8a8a80;\">Original page copy. Verbatim. Structure and emphasis only.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;border:1px solid #4a4126;border-radius:8px;padding:16px;background:#241f12;\">\n          <span style=\"flex:none;width:14px;height:14px;border-radius:3px;background:#c9a23f;margin-top:2px;\"><\u002Fspan>\n          <div><div style=\"font:700 11px/1.3 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#e6c879;margin-bottom:5px;\">AEO Addition<\u002Fdiv><div style=\"font:400 13px/1.5 system-ui;color:#b9a878;\">New copy written for AI citation. Pasted verbatim, de-emphasized, live HTML text.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;border:1px solid #4a2626;border-radius:8px;padding:16px;background:#241313;\">\n          <span style=\"flex:none;width:14px;height:14px;border-radius:3px;background:#c25b5b;margin-top:2px;\"><\u002Fspan>\n          <div><div style=\"font:700 11px/1.3 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#e09090;margin-bottom:5px;\">Flag<\u002Fdiv><div style=\"font:400 13px/1.5 system-ui;color:#b98787;\">Pre-launch action. Developer or PR task. Not visible page copy.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:44px;\">\n        <div style=\"border-top:2px solid #46453d;padding-top:20px;\">\n          <div style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:#a8a69d;margin-bottom:12px;\">What this is<\u002Fdiv>\n          <p style=\"font:400 15px/1.6 system-ui;color:#cdcbc2;margin:0;\">Layout, section order, and copy flow. The locked copy is placed exactly as written, reformatted for the web.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #46453d;padding-top:20px;\">\n          <div style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:#a8a69d;margin-bottom:12px;\">What it is not<\u002Fdiv>\n          <p style=\"font:400 15px/1.6 system-ui;color:#cdcbc2;margin:0;\">Not the final design. Brand color, typography, photography, and the logo all come in a later pass.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #46453d;padding-top:20px;\">\n          <div style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:#a8a69d;margin-bottom:12px;\">How to read it<\u002Fdiv>\n          <p style=\"font:400 15px/1.6 system-ui;color:#cdcbc2;margin:0;\">Each section is labeled at the top: its name on the left, and its role in the story on the right.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #33332d;border-radius:10px;padding:28px 32px;background:#1f1f1b;\">\n        <div style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:#a8a69d;margin-bottom:18px;\">The page tells one story, in five movements<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;\">\n          <span style=\"font:600 14px/1 system-ui;color:#f3f1ea;padding:9px 16px;border:1px solid #46453d;border-radius:999px;\">Problem<\u002Fspan>\n          <span style=\"color:#6f6e66;font-size:16px;\">→<\u002Fspan>\n          <span style=\"font:600 14px/1 system-ui;color:#f3f1ea;padding:9px 16px;border:1px solid #46453d;border-radius:999px;\">Insight<\u002Fspan>\n          <span style=\"color:#6f6e66;font-size:16px;\">→<\u002Fspan>\n          <span style=\"font:600 14px/1 system-ui;color:#f3f1ea;padding:9px 16px;border:1px solid #46453d;border-radius:999px;\">Solution<\u002Fspan>\n          <span style=\"color:#6f6e66;font-size:16px;\">→<\u002Fspan>\n          <span style=\"font:600 14px/1 system-ui;color:#f3f1ea;padding:9px 16px;border:1px solid #46453d;border-radius:999px;\">Proof<\u002Fspan>\n          <span style=\"color:#6f6e66;font-size:16px;\">→<\u002Fspan>\n          <span style=\"font:600 14px/1 system-ui;color:#23231f;background:#cfcdc4;padding:9px 16px;border:1px solid #cfcdc4;border-radius:999px;\">Action<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:12px;align-items:flex-start;margin-top:28px;padding:14px 16px;border:1px dashed #46453d;border-radius:6px;\">\n        <span style=\"flex:none;font:700 10px/1.6 ui-monospace,monospace;letter-spacing:.1em;color:#8a8a80;background:#33332d;padding:3px 7px;border-radius:3px;\">NOTE<\u002Fspan>\n        <span style=\"font:500 13px/1.6 system-ui;color:#8a8a80;max-width:80ch;\">Dashed boxes mark placeholders for content arriving later: hero visual, the assessment UI, Brian's photo and video, testimonial names, and the footer disclosures.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PRE-LAUNCH DEV REQUIREMENTS (FLAGS) ============ -->\n  <section data-screen-label=\"Meta &amp; Schema p with foundingDate (1993), founder link, url, and sameAs links<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:12px;align-items:flex-start;font:400 14px/1.5 system-ui;color:#cdcbc2;\"><span style=\"flex:none;width:18px;height:18px;border:1px solid #6e4a4a;border-radius:4px;margin-top:1px;\"><\u002Fspan><span>Publish llms.txt at site root<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HEADER / NAV -->\n  <header style=\"position:sticky;top:0;z-index:50;background:rgba(236,234,230,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #d9d7d0;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n        <div style=\"width:40px;height:40px;border:1px solid #b9b7af;border-radius:6px;display:flex;align-items:center;justify-content:center;font:700 13px/1 ui-monospace,monospace;color:#8a8a80;letter-spacing:.04em;\">SFG<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <div style=\"width:150px;height:9px;background:#cdcbc3;border-radius:2px;\"><\u002Fdiv>\n          <div style=\"width:96px;height:7px;background:#dad8d1;border-radius:2px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <nav style=\"display:flex;align-items:center;gap:26px;\">\n        <a href=\"#cost\" style=\"font:600 13px/1 system-ui;letter-spacing:.02em;color:#56564f;text-decoration:none;\" style-hover=\"color:#3f5067;\">The Stakes<\u002Fa>\n        <a href=\"#how\" style=\"font:600 13px/1 system-ui;letter-spacing:.02em;color:#56564f;text-decoration:none;\" style-hover=\"color:#3f5067;\">How It Works<\u002Fa>\n        <a href=\"#framework\" style=\"font:600 13px/1 system-ui;letter-spacing:.02em;color:#56564f;text-decoration:none;\" style-hover=\"color:#3f5067;\">The Framework<\u002Fa>\n        <a href=\"#about\" style=\"font:600 13px/1 system-ui;letter-spacing:.02em;color:#56564f;text-decoration:none;\" style-hover=\"color:#3f5067;\">About<\u002Fa>\n        <a href=\"#cta\" style=\"display:inline-flex;align-items:center;gap:8px;background:#3f5067;color:#fff;font:600 13px/1 system-ui;padding:11px 18px;border-radius:7px;text-decoration:none;border:1px solid #3f5067;\" style-hover=\"background:#33415540;background-color:#33415a;\">Schedule a Call<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ================= HERO ================= -->\n  <section id=\"hero\" data-screen-label=\"Hero\" style=\"background:#ffffff;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:88px 32px 96px;display:grid;grid-template-columns:1.15fr 0.85fr;gap:64px;align-items:center;\">\n      <div>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:36px;\">\n          <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">Hero<\u002Fspan>\n          <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Hook<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font:700 clamp(34px,4.4vw,56px)/1.1 system-ui;letter-spacing:-.02em;margin:0 0 28px;color:#23231f;text-wrap:balance;max-width:18ch;\">You Spent a Lifetime Building It. This Is the Season That Determines What Happens to It.<\u002Fh1>\n        <p style=\"font:400 clamp(18px,1.5vw,21px)/1.55 system-ui;color:#4f4f48;margin:0 0 20px;max-width:54ch;\">The years surrounding retirement aren't just a transition. They're the <strong style=\"font-weight:700;color:#23231f;\">highest-stakes financial window of your life<\u002Fstrong>. More decisions. More complexity. More consequences that can't be undone.<\u002Fp>\n        <p style=\"font:400 17px/1.6 system-ui;color:#6a6a62;margin:0 0 36px;max-width:52ch;\">You've done the hard part. What comes next deserves the same level of intention that got you here.<\u002Fp>\n        <a href=\"#how\" style=\"display:inline-flex;align-items:center;gap:10px;background:#3f5067;color:#fff;font:600 16px/1 system-ui;padding:17px 30px;border-radius:8px;text-decoration:none;border:1px solid #3f5067;\" style-hover=\"background-color:#33415a;\">See how WealthSync™ works <span style=\"font-size:18px;\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div style=\"position:relative;border:1px dashed #c4c2ba;background-color:#f1f0ec;background-image:linear-gradient(to top right,transparent calc(50% - .5px),#dad8d1 calc(50% - .5px),#dad8d1 calc(50% + .5px),transparent calc(50% + .5px)),linear-gradient(to top left,transparent calc(50% - .5px),#dad8d1 calc(50% - .5px),#dad8d1 calc(50% + .5px),transparent calc(50% + .5px));min-height:440px;display:flex;align-items:center;justify-content:center;border-radius:4px;\">\n        <span style=\"background:#eceae6;border:1px solid #d9d7d0;font:600 11px/1.4 ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8a80;padding:9px 15px;text-align:center;\">Hero Visual<br><span style=\"color:#a8a69d;\">image / brand moment<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- AEO POSITIONING STATEMENT (citation anchor) -->\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 32px 64px;\">\n      <div style=\"border:1px solid #d8c79a;border-radius:8px;background:#faf6ea;padding:22px 26px;max-width:880px;\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;\">\n          <span style=\"font:700 10px/1.6 ui-monospace,monospace;letter-spacing:.1em;color:#fff;background:#c9a23f;padding:3px 8px;border-radius:3px;\">AEO ADDITION · PASTE VERBATIM<\u002Fspan>\n          <span style=\"font:600 10px/1.4 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#9a7d2e;\">Below hero · de-emphasized · page citation anchor<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font:400 14px/1.65 system-ui;color:#6a6356;margin:0 0 12px;max-width:78ch;\">Brian Skrobonja is a Certified Private Wealth Advisor (CPWA) and Chartered Financial Consultant (ChFC) with over 30 years of experience helping business owners and high-income families build coordinated retirement, tax, and estate strategies. He is the founder of Skrobonja Financial Group, a St. Louis-based wealth management firm established in 1993, and the creator of the WealthSync process: a proprietary three-phase framework that aligns every layer of a client's financial life across investments, income, taxes, insurance, and estate planning. Brian is the author of three books on wealth management and financial planning, a regular contributor to Kiplinger, and host of the Common-Sense Financial podcast, ranked among the Forbes Top 10 Podcasts by Financial Advisors.<\u002Fp>\n        <p style=\"font:500 12px/1.55 system-ui;color:#9a7d2e;margin:0;max-width:78ch;font-style:italic;\">Design note: typeset small and muted. Must be live, crawlable HTML text, never an image. Do not suppress with display:none or visibility:hidden.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 01 WE KNOW WHERE YOU ARE ================= -->\n  <section id=\"where\" data-screen-label=\"01 We Know Where You Are\" style=\"background:#f4f3f0;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:840px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">01 · We Know Where You Are<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Problem · Empathy<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(28px,3.2vw,40px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 32px;color:#23231f;max-width:20ch;text-wrap:balance;\">You've Worked Too Hard to Leave This to Chance.<\u002Fh2>\n      <p style=\"font:500 20px/1.5 system-ui;color:#3a3a35;margin:0 0 24px;max-width:60ch;\">You didn't get here by accident.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 24px;max-width:60ch;\">Decades of discipline. Smart decisions. Sacrifices other people weren't willing to make.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 24px;max-width:62ch;\">And now you're standing at the edge of the transition you've been building toward your whole career, retirement, a business exit, or a major shift in how your wealth needs to work for you.<\u002Fp>\n\n      <blockquote style=\"margin:36px 0;padding:24px 28px;border-left:3px solid #3f5067;background:#fff;border-radius:0 6px 6px 0;font:600 23px/1.4 system-ui;color:#23231f;max-width:46ch;\">It should feel like a finish line. For a lot of people, it feels more like standing at a crossroads with no map.<\u002Fblockquote>\n\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 24px;max-width:62ch;\">The decisions you're facing now are unlike anything that came before. They're more interconnected. <strong style=\"font-weight:700;color:#23231f;\">The stakes are higher.<\u002Fstrong> And the window to get them right is narrower than most people realize.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 24px;max-width:62ch;\">You're not looking for more information. You're looking for someone who has been here before, with people like you, and knows exactly what to do.<\u002Fp>\n      <p style=\"font:600 19px/1.5 system-ui;color:#23231f;margin:0 0 28px;max-width:60ch;\">That's why we built WealthSync™.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 24px;max-width:64ch;\">We work with successful professionals, executives, and entrepreneurs who have built wealth, in a business, real estate, intellectual property, or decades of disciplined investing, and are now navigating the transition that determines what happens to it.<\u002Fp>\n      <p style=\"font:500 18px/1.6 system-ui;color:#3a3a35;margin:0;max-width:60ch;\">If that's you, keep reading.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 02 THE COST OF GETTING THIS WRONG ================= -->\n  <section id=\"cost\" data-screen-label=\"02 The Cost of Getting This Wrong\" style=\"background:#ffffff;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:900px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">02 · The Cost of Getting This Wrong<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Problem · Stakes<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(28px,3.2vw,40px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 36px;color:#23231f;max-width:26ch;text-wrap:balance;\">Most People Don't Lose What They've Built All at Once. They Lose It Gradually, Through Decisions That Seemed Fine at the Time.<\u002Fh2>\n\n      <ul style=\"list-style:none;margin:0 0 36px;padding:0;display:flex;flex-direction:column;gap:0;border-top:1px solid #e2e0d9;max-width:64ch;\">\n        <li style=\"display:flex;gap:18px;align-items:flex-start;padding:18px 0;border-bottom:1px solid #e2e0d9;font:400 18px/1.5 system-ui;color:#56564f;\">\n          <span style=\"flex:none;width:22px;height:22px;margin-top:2px;border:1px solid #c4c2ba;border-radius:4px;background:#f4f3f0;\"><\u002Fspan>\n          <span>A portfolio too exposed to market swings right when withdrawals begin.<\u002Fspan>\n        <\u002Fli>\n        <li style=\"display:flex;gap:18px;align-items:flex-start;padding:18px 0;border-bottom:1px solid #e2e0d9;font:400 18px/1.5 system-ui;color:#56564f;\">\n          <span style=\"flex:none;width:22px;height:22px;margin-top:2px;border:1px solid #c4c2ba;border-radius:4px;background:#f4f3f0;\"><\u002Fspan>\n          <span>A tax strategy that was never updated for what retirement actually looks like.<\u002Fspan>\n        <\u002Fli>\n        <li style=\"display:flex;gap:18px;align-items:flex-start;padding:18px 0;border-bottom:1px solid #e2e0d9;font:400 18px/1.5 system-ui;color:#56564f;\">\n          <span style=\"flex:none;width:22px;height:22px;margin-top:2px;border:1px solid #c4c2ba;border-radius:4px;background:#f4f3f0;\"><\u002Fspan>\n          <span>An income plan built on assumptions instead of engineering.<\u002Fspan>\n        <\u002Fli>\n        <li style=\"display:flex;gap:18px;align-items:flex-start;padding:18px 0;border-bottom:1px solid #e2e0d9;font:400 18px/1.5 system-ui;color:#56564f;\">\n          <span style=\"flex:none;width:22px;height:22px;margin-top:2px;border:1px solid #c4c2ba;border-radius:4px;background:#f4f3f0;\"><\u002Fspan>\n          <span>An estate that passes on conflict instead of clarity.<\u002Fspan>\n        <\u002Fli>\n      <\u002Ful>\n\n      <p style=\"font:600 24px/1.4 system-ui;color:#23231f;margin:0 0 28px;max-width:40ch;\">None of these feel urgent, until they are.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 24px;max-width:62ch;\">And by then, the window to fix them has often already closed.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 24px;max-width:64ch;\">The families who struggle in retirement rarely made reckless decisions. They simply didn't have someone coordinating the full picture, until it was too late to matter.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0;max-width:64ch;\">That moment, the one where a <strong style=\"font-weight:700;color:#23231f;\">fixable problem becomes a permanent one<\u002Fstrong>, is exactly what this firm was built to prevent.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 03 THE THREE RISKS YOU ALREADY KNOW ABOUT ================= -->\n  <section id=\"risks-known\" data-screen-label=\"03 The Three Risks You Already Know About\" style=\"background:#f4f3f0;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">03 · The Three Risks You Already Know About<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Problem · Named<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(28px,3.2vw,40px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 48px;color:#23231f;max-width:24ch;text-wrap:balance;\">You Don't Have to Say It Out Loud. We've Heard It Enough Times to Know.<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:44px;\">\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:30px;display:flex;flex-direction:column;gap:16px;\" style-hover=\"border-color:#b9b7af;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">01<\u002Fspan>\n          <h3 style=\"font:700 22px/1.2 system-ui;color:#23231f;margin:0;\">Market Risk.<\u002Fh3>\n          <p style=\"font:400 16px/1.6 system-ui;color:#56564f;margin:0;\">What if the market drops right when you start drawing income? Unlike your working years, there's no time to recover. A bad sequence of returns early in retirement can permanently alter everything you planned for.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:30px;display:flex;flex-direction:column;gap:16px;\" style-hover=\"border-color:#b9b7af;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">02<\u002Fspan>\n          <h3 style=\"font:700 22px/1.2 system-ui;color:#23231f;margin:0;\">Tax Risk.<\u002Fh3>\n          <p style=\"font:400 16px/1.6 system-ui;color:#56564f;margin:0;\">Decades of deferred taxes are sitting inside your investments, retirement plans, and deferred compensation, and retirement is often when the IRS comes to collect. Without a proactive strategy, you could hand over far more than necessary during the years you can least afford it.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:30px;display:flex;flex-direction:column;gap:16px;\" style-hover=\"border-color:#b9b7af;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">03<\u002Fspan>\n          <h3 style=\"font:700 22px/1.2 system-ui;color:#23231f;margin:0;\">Income Risk.<\u002Fh3>\n          <p style=\"font:400 16px/1.6 system-ui;color:#56564f;margin:0;\">The paycheck stops. Now every dollar has to be engineered to last. Without a deliberate income design, you're guessing, and in retirement, guessing has consequences that compound.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid #d9d7d0;padding-top:28px;max-width:60ch;\">\n        <p style=\"font:500 18px/1.6 system-ui;color:#3a3a35;margin:0 0 12px;\">These three risks are real. They're what brought you here.<\u002Fp>\n        <p style=\"font:700 20px/1.5 system-ui;color:#23231f;margin:0;\">But here's what most people don't realize: there are three more.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 04 THE RISKS YOU DIDN'T KNOW TO ASK ABOUT ================= -->\n  <section id=\"risks-hidden\" data-screen-label=\"04 The Risks You Didn't Know to Ask About\" style=\"background:#ffffff;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">04 · The Risks You Didn't Know to Ask About<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Insight · Reframe<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(28px,3.2vw,40px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 20px;color:#23231f;max-width:24ch;text-wrap:balance;\">The Hidden Risks That Quietly Undermine Even the Best-Laid Plans<\u002Fh2>\n      <p style=\"font:400 19px/1.6 system-ui;color:#56564f;margin:0 0 48px;max-width:58ch;\">Most advisors address what you ask about. <strong style=\"font-weight:700;color:#23231f;\">We address what you haven't thought to ask yet.<\u002Fstrong><\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:48px;\">\n        <div style=\"background:#f4f3f0;border:1px solid #e2e0d9;border-radius:10px;padding:30px;display:flex;flex-direction:column;gap:16px;\" style-hover=\"border-color:#b9b7af;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">04<\u002Fspan>\n          <h3 style=\"font:700 21px/1.25 system-ui;color:#23231f;margin:0;\">Purpose-Driven Assets.<\u002Fh3>\n          <p style=\"font:400 16px/1.6 system-ui;color:#56564f;margin:0;\">Not every dollar should do the same job. Without intentional design, assets end up misallocated, working against each other instead of together. The result is unnecessary exposure, missed opportunity, and a financial picture that doesn't match how you actually live.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f4f3f0;border:1px solid #e2e0d9;border-radius:10px;padding:30px;display:flex;flex-direction:column;gap:16px;\" style-hover=\"border-color:#b9b7af;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">05<\u002Fspan>\n          <h3 style=\"font:700 21px/1.25 system-ui;color:#23231f;margin:0;\">Liquidity &amp; Opportunity.<\u002Fh3>\n          <p style=\"font:400 16px/1.6 system-ui;color:#56564f;margin:0;\">Wealth locked in the wrong places creates a different kind of poverty. Whether your wealth is in a business, real estate, intellectual property, or a lifetime of investing, when opportunity arises or an unexpected need surfaces, the inability to access capital without disrupting your plan is a risk most people never see coming.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f4f3f0;border:1px solid #e2e0d9;border-radius:10px;padding:30px;display:flex;flex-direction:column;gap:16px;\" style-hover=\"border-color:#b9b7af;\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">06<\u002Fspan>\n          <h3 style=\"font:700 21px/1.25 system-ui;color:#23231f;margin:0;\">Estate Planning.<\u002Fh3>\n          <p style=\"font:400 16px/1.6 system-ui;color:#56564f;margin:0;\">This isn't just documents. Without intentional design, what you've spent a lifetime building may not go where you intend, and the cost, delay, and conflict left behind can undo in months what took decades to create.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid #d9d7d0;padding-top:32px;display:flex;flex-direction:column;gap:20px;align-items:flex-start;\">\n        <p style=\"font:600 24px/1.4 system-ui;color:#23231f;margin:0;max-width:34ch;\">Six areas. All interconnected. None designed to function alone.<\u002Fp>\n        <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0;max-width:54ch;\">This is what WealthSync™ was built to coordinate.<\u002Fp>\n        <a href=\"#framework\" style=\"display:inline-flex;align-items:center;gap:8px;color:#3f5067;font:600 16px/1.4 system-ui;text-decoration:none;border-bottom:1px solid #c3cad6;padding-bottom:3px;\" style-hover=\"border-color:#3f5067;\">See how WealthSync™ addresses all six <span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 05 THE GAP ================= -->\n  <section id=\"gap\" data-screen-label=\"05 The Gap\" style=\"background:#23231f;border-bottom:1px solid #1a1a17;\">\n    <div style=\"max-width:880px;margin:0 auto;padding:104px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #46453d;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">05 · The Gap<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#6f6e66;\">Insight · Why<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(28px,3.2vw,42px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 36px;color:#f3f1ea;max-width:24ch;text-wrap:balance;\">Most Advisors Manage Your Money. Nobody Is Managing the Whole Picture.<\u002Fh2>\n      <p style=\"font:400 18px/1.65 system-ui;color:#cdcbc2;margin:0 0 22px;max-width:62ch;\">The financial industry was built for accumulation, and most firms are still operating that way.<\u002Fp>\n      <p style=\"font:400 18px/1.65 system-ui;color:#cdcbc2;margin:0 0 22px;max-width:62ch;\">They manage your portfolio. They may run a tax return. They might have someone review your estate documents.<\u002Fp>\n      <p style=\"font:600 20px/1.55 system-ui;color:#f3f1ea;margin:0 0 22px;max-width:60ch;\">But nobody is sitting at the center, making sure every decision in one area isn't quietly working against another.<\u002Fp>\n      <p style=\"font:400 18px/1.65 system-ui;color:#cdcbc2;margin:0 0 22px;max-width:60ch;\">Investment decisions made without income context. Tax moves made without estate awareness. Risk management treated as an afterthought.<\u002Fp>\n      <p style=\"font:400 18px/1.65 system-ui;color:#cdcbc2;margin:0 0 28px;max-width:62ch;\">When no one coordinates the full picture, you become the coordinator. Reconciling advice. Filling gaps. Carrying the weight of decisions that deserve more.<\u002Fp>\n      <p style=\"font:700 26px/1.3 system-ui;color:#fff;margin:0;letter-spacing:-.01em;\">WealthSync™ changes that.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 06 THE 7-MINUTE CHECK ================= -->\n  <section id=\"check\" data-screen-label=\"06 The 7-Minute WealthSync Check\" style=\"background:#f4f3f0;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto; ncome, taxes, and investments. Designed for business owners and high-income families, the diagnostic surfaces hidden inefficiencies and misalignments before an initial discovery call. No obligation is required to complete it.<\u002Fp>\n        <p style=\"font:500 12px/1.55 system-ui;color:#9a7d2e;margin:0;max-width:80ch;font-style:italic;\">Design note: can be set small beneath the CTA button or in a light panel below the section. Must be live crawlable HTML text.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 07 HOW IT WORKS ================= -->\n  <section id=\"how\" data-screen-label=\"07 How It Works\" style=\"background:#ffffff;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">07 · How It Works<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Solution · Process<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(28px,3.2vw,40px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 24px;color:#23231f;max-width:22ch;text-wrap:balance;\">A Structured Journey, Not a Series of Meetings<\u002Fh2>\n      <p style=\"font:400 19px/1.6 system-ui;color:#56564f;margin:0 0 48px;max-width:60ch;\">WealthSync™ is a consultative process that takes you from where you are to where you need to be, with <strong style=\"font-weight:700;color:#23231f;\">clarity at every step and nothing left to chance<\u002Fstrong>.<\u002Fp>\n\n      <!-- STEP RAIL (diagram, labels pulled from copy) -->\n      <div style=\"border:1px dashed #c4c2ba;border-radius:12px;padding:14px 14px 8px;background:#faf9f6;margin-bottom:40px;\">\n        <div style=\"font:600 10px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;padding:8px 10px 16px;\">Process Diagram · wireframe<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:12px;\">\n          <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:8px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;\">\n            <span style=\"font:700 12px/1 ui-monospace,monospace;color:#3f5067;\">STEP 01<\u002Fspan>\n            <span style=\"font:600 17px/1.25 system-ui;color:#23231f;\">90-minute Discovery<\u002Fspan>\n            <span style=\"font:400 14px/1.5 system-ui;color:#6a6a62;\">Learn everything about your situation<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:8px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;\">\n            <span style=\"font:700 12px/1 ui-monospace,monospace;color:#3f5067;\">STEP 02<\u002Fspan>\n            <span style=\"font:600 17px/1.25 system-ui;color:#23231f;\">Map your opportunities<\u002Fspan>\n            <span style=\"font:400 14px/1.5 system-ui;color:#6a6a62;\">Where the gaps and openings are<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:8px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;\">\n            <span style=\"font:700 12px/1 ui-monospace,monospace;color:#3f5067;\">STEP 03<\u002Fspan>\n            <span style=\"font:600 17px/1.25 system-ui;color:#23231f;\">Present our findings<\u002Fspan>\n            <span style=\"font:400 14px/1.5 system-ui;color:#6a6a62;\">If we're the right fit<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:8px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;\">\n            <span style=\"font:700 12px/1 ui-monospace,monospace;color:#3f5067;\">STEP 04<\u002Fspan>\n            <span style=\"font:600 17px/1.25 system-ui;color:#23231f;\">Build &amp; activate<\u002Fspan>\n            <span style=\"font:400 14px/1.5 system-ui;color:#6a6a62;\">Your complete financial system<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#eef1f4;border:1px solid #ccd4dd;border-radius:8px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;\">\n            <span style=\"font:700 12px/1 ui-monospace,monospace;color:#3f5067;\">ONGOING<\u002Fspan>\n            <span style=\"font:600 17px/1.25 system-ui;color:#23231f;\">Quarterly Pulse<\u002Fspan>\n            <span style=\"font:400 14px/1.5 system-ui;color:#6a6a62;\">Reviewed, adjusted, aligned<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 22px;max-width:64ch;\">It begins with a 90-minute Discovery where we learn everything about your situation, your goals, and what matters most to you. From there, we map your opportunities, present our findings, and, if we're the right fit, move into building and activating your complete financial system.<\u002Fp>\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 36px;max-width:64ch;\">Once you're inside the WealthSync™ process, you're never guessing about where things stand. A quarterly Pulse keeps every layer of your financial life actively reviewed, adjusted, and aligned, year after year.<\u002Fp>\n\n      <div style=\"display:flex;gap:20px;flex-wrap:wrap;margin-bottom:36px;\">\n        <div style=\"flex:1;min-width:280px;border-left:3px solid #b9b7af;padding:6px 0 6px 20px;\">\n          <div style=\"font:600 12px/1 ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8a80;margin-bottom:8px;\">Year 1<\u002Fdiv>\n          <div style=\"font:500 17px/1.5 system-ui;color:#3a3a35;\">Sessions driven by work in progress.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:280px;border-left:3px solid #3f5067;padding:6px 0 6px 20px;\">\n          <div style=\"font:600 12px/1 ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8a80;margin-bottom:8px;\">Year 2 and beyond<\u002Fdiv>\n          <div style=\"font:500 17px/1.5 system-ui;color:#3a3a35;\">The quarterly flywheel rotates continuously.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:8px;color:#3f5067;font:600 16px/1.4 system-ui;text-decoration:none;border-bottom:1px solid #c3cad6;padding-bottom:3px;\" style-hover=\"border-color:#3f5067;\"><span>→<\u002Fspan> See the full WealthSync™ process<\u002Fa>\n\n      <!-- AEO METHODOLOGY DEFINITION -->\n      <div style=\"border:1px solid #d8c79a;border-radius:8px;background:#faf6ea;padding:24px 28px;margin-top:44px;max-width:880px;\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;\">\n          <span style=\"font:700 10px/1.6 ui-monospace,monospace;letter-spacing:.1em;color:#fff;background:#c9a23f;padding:3px 8px;border-radius:3px;\">AEO ADDITION · PASTE VERBATIM<\u002Fspan>\n          <span style=\"font:600 10px/1.4 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#9a7d2e;\">Below How It Works · light panel · key page definition<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font:400 14px/1.7 system-ui;color:#6a6356;margin:0 0 12px;max-width:80ch;\">WealthSync is the proprietary wealth management process developed by Brian Skrobonja at Skrobonja Financial Group that coordinates every layer of a client's financial life into one aligned strategy. The process moves through three phases: Discovery and Mapping, in which the client's goals, values, risks, and financial landscape are documented; Design and Implementation, in which a custom plan is built across investments, income, tax, and estate and immediately executed; and Ongoing Optimization, in which the plan is continuously monitored and adjusted as life, goals, and the tax environment change. WealthSync is designed for business owners, executives, and high-income families navigating the transition from wealth accumulation to wealth distribution, protection, and legacy.<\u002Fp>\n        <p style=\"font:500 12px/1.55 system-ui;color:#9a7d2e;margin:0;max-width:80ch;font-style:italic;\">Design note: typeset in a light gray panel beneath the process diagram. Must be live crawlable HTML text.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 08 THE FRAMEWORK ================= -->\n  <section id=\"framework\" data-screen-label=\"08 The Framework\" style=\"background:#f4f3f0;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">08 · The Framework<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Solution · System<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(28px,3.2vw,40px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 24px;color:#23231f;max-width:20ch;text-wrap:balance;\">Six Coordinated Layers. One Intentional System.<\u002Fh2>\n      <p style=\"font:400 19px/1.6 system-ui;color:#56564f;margin:0 0 48px;max-width:64ch;\">The WealthSync™ Framework is the architecture behind every decision we make together. Six disciplines, none designed to function alone, coordinated so that <strong style=\"font-weight:700;color:#23231f;\">every dollar has a purpose, every decision has context, and nothing works against itself<\u002Fstrong>.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px;\">\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:24px;display:flex;align-items:center;gap:16px;\" style-hover=\"border-color:#b9b7af;\"><span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">01<\u002Fspan><span style=\"font:600 18px/1.25 system-ui;color:#23231f;\">Purpose Driven Assets<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:24px;display:flex;align-items:center;gap:16px;\" style-hover=\"border-color:#b9b7af;\"><span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">02<\u002Fspan><span style=\"font:600 18px/1.25 system-ui;color:#23231f;\">Income Architecture<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:24px;display:flex;align-items:center;gap:16px;\" style-hover=\"border-color:#b9b7af;\"><span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">03<\u002Fspan><span style=\"font:600 18px/1.25 system-ui;color:#23231f;\">Tax Strategy<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:24px;display:flex;align-items:center;gap:16px;\" style-hover=\"border-color:#b9b7af;\"><span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">04<\u002Fspan><span style=\"font:600 18px/1.25 system-ui;color:#23231f;\">Risk Management<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:24px;display:flex;align-items:center;gap:16px;\" style-hover=\"border-color:#b9b7af;\"><span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">05<\u002Fspan><span style=\"font:600 18px/1.25 system-ui;color:#23231f;\">Liquidity &amp; Opportunity<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e2e0d9;border-radius:10px;padding:24px;display:flex;align-items:center;gap:16px;\" style-hover=\"border-color:#b9b7af;\"><span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #c4c2ba;border-radius:8px;font:700 13px/1 ui-monospace,monospace;color:#3f5067;\">06<\u002Fspan><span style=\"font:600 18px/1.25 system-ui;color:#23231f;\">Estate Planning<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font:400 18px/1.6 system-ui;color:#56564f;margin:0 0 32px;max-width:60ch;\">Every layer influences the others. Coordination transforms planning into an intentional system.<\u002Fp>\n\n      <div style=\"background:#23231f;border-radius:12px;padding:36px 40px;margin-bottom:36px;\">\n        <div style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;margin-bottom:16px;\">The WealthSync™ Promise<\u002Fdiv>\n        <p style=\"font:600 22px/1.45 system-ui;color:#f3f1ea;margin:0;max-width:54ch;\">No financial decision is made in isolation. Every dollar is guided by rules-based discipline, positioned with purpose, aligned to your full financial picture.<\u002Fp>\n      <\u002Fdiv>\n\n      <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:8px;color:#3f5067;font:600 16px/1.4 system-ui;text-decoration:none;border-bottom:1px solid #c3cad6;padding-bottom:3px;\" style-hover=\"border-color:#3f5067;\"><span>→<\u002Fspan> Explore the WealthSync™ Framework<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 09 THREE THINGS THAT MAKE US DIFFERENT ================= -->\n  <section id=\"different\" data-screen-label=\"09 Three Things That Make Us Different\" style=\"background:#ffffff;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">09 · Three Things That Make Us Different<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Solution · Differentiation<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font:700 clamp(30px,3.6vw,46px)/1.1 system-ui;letter-spacing:-.01em;margin:0 0 48px;color:#23231f;\">Clarity. Coordination. Control.<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px;\">\n        <div style=\"border-top:2px solid #3f5067;padding-top:24px;\">\n          <h3 style=\"font:700 24px/1.2 system-ui;color:#23231f;margin:0 0 14px;\">Clarity.<\u002Fh3>\n          <p style=\"font:400 17px/1.6 system-ui;color:#56564f;margin:0;\">You see your full financial picture, not just the pieces. No more wondering what you're missing or whether everything fits together.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #3f5067;padding-top:24px;\">\n          <h3 style=\"font:700 24px/1.2 system-ui;color:#23231f;margin:0 0 14px;\">Coordination.<\u002Fh3>\n          <p style=\"font:400 17px/1.6 system-ui;color:#56564f;margin:0;\">Every discipline works as one system. Income, taxes, assets, risk, liquidity, and estate, all aligned, all connected, none operating in isolation.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #3f5067;padding-top:24px;\">\n          <h3 style=\"font:700 24px/1.2 system-ui;color:#23231f;margin:0 0 14px;\">Control.<\u002Fh3>\n          <p style=\"font:400 17px/1.6 system-ui;color:#56564f;margin:0;\">Every dollar has a purpose and a rule. You remain the CEO of your financial life. We serve as your CFO, making sure the system runs the way it should.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 10 ABOUT BRIAN ================= -->\n  <section id=\"about\" data-screen-label=\"10 About Brian\" style=\"background:#f4f3f0;border-bottom:1px solid #e2e0d9;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:96px 32px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid #d9d7d0;padding-bottom:12px;margin-bottom:40px;\">\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#8a8a80;\">10 · About Brian<\u002Fspan>\n        <span style=\"font:600 11px/1 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;color:#a8a69d;\">Proof · Authority<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:0.8fr 1.2fr;gap:56px;align-items:start;\">\n        <div style=\"position:sticky;top:120px;display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"border:1px dashed #c4c2ba;background-color:#f1f0ec;background-image:linear-gradient(to top right,transparent calc(50% - .5px),#dad8d1 calc(50% - .5px),#dad8d1 calc(50% + .5px),transparent calc(50% + .5px)),linear-gradient(to top left,transparent calc(50% - .5px),#dad8d1 calc(50% - .5px),#dad8d1 calc(50% + .5px),transparent calc(50% + .5px));aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;border-radius:6px;\">\n            <span style=\"background:#eceae6;border:1px solid #d9d7d0;font:600 11px/1.4 ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8a80;padding:9px 15px;text-align:center;\">Brian · Photo<br><span style=\"color:#a8a69d;\">portrait + video<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border:1px dashed #c9a23f;background:#faf6ea;border-radius:6px;\">\n            <span style=\"flex:none;font:700 10px/1.6 ui-monospace,monospace;letter-spacing:.1em;color:#9a7d2e;background:#f0e4c0;padding:3px 7px;border-radius:3px;\">NOTE<\u002Fspan>\n            <span style=\"font:500 13px/1.55 system-ui;color:#7c6a30;\">Web team direction (not body copy): insert Brian's photo and a 60 to 90 second direct-to-camera video here.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <h2 style=\"font:700 clamp(28px,3.2vw,40px)/1.18 system-ui;letter-spacing:-.01em;margin:0 0 32px;color:#23231f;max-width:22ch;text-wrap:balance;\">Why I've Spent 30 Years Focused on This One Problem<\u002Fh2>\n          <p style=\"font:400 18px/1.65 system-ui;color:#56564f;margin:0 0 22px;max-width:62ch;\">I grew up in a blue-collar family in St. Louis. My dad came from Croatia, worked hard his entire life, and was always the smartest guy in the room when it came to figuring things out. But he traded time for money his whole career, and I watched that limit what was possible for him.<\u002Fp>\n          <p style=\"font:400 18px/1.65 system-ui;color:#56564f;margin:0 0 22px;max-width:62ch;\">In my twenties I made the same mistake. I chased the lifestyle before I understood how wealth actually works. It took years of doing it wrong before I had the clarity that changed everything: <strong style=\"font-weight:700;color:#23231f;\">real financial freedom doesn't come from earning more. It comes from building assets that generate income<\u002Fstrong>, so money works for you instead of the other way around.<\u002Fp>\n          <p style=\"font:400 18px/1.65 system-ui;color:#56564f;margin:0 0 22px;max-width:62ch;\">That realization became the foundation for everything I've built since 1993. Thirty-plus years of working alongside successful families and entrepreneurs at exactly the moment that matters most, the transition from building wealth to protecting it, living on it, and passing it on.<\u002Fp>\n          <p style=\"font:400 18px/1.65 system-ui;color:#56564f;margin:0 0 22px;max-width:62ch;\">What I've learned over those years is simple: the people who struggle in this season aren't the ones who made bad decisions. They're the ones who didn't have a system, or someone coordinating the whole picture.<\u002Fp>\n          <p style=\"font:400 18px/1.65 system-ui;color:#56564f;margin:0 0 22px;max-width:62ch;\">WealthSync™ is the answer to that problem. And after three decades, I still love this work, because I know what it means to a family when it's done right.<\u002Fp>\n\n          <blockquote style=\"margin:32px 0;padding:24px 28px;border-left:3px solid #3f5067;background:#fff;border-radius:0 6px 6px 0;font:600 22px/1.45 system-ui;color:#23231f;max-width:48ch;\">My job isn't to manage your money. It's to make sure you never have to wonder if something important is being missed.<\u002Fblockquote>\n\n          <div style=\"border-top:1px solid #d9d7d0;padding-top:24px;margin-top:8px;\">\n            <div style=\"font:700 19px/1.3 system-ui;color:#23231f;margin-bottom:8px;\">Brian Skrobonja, ChFC®, CPWA®<\u002Fdiv>\n            <div style=\"font:400 15px/1.7 system-ui;color:#6a6a62;max-width:62ch;\">Founder, Skrobonja Financial Group · 30+ years in practice · Author of three books · Host, Common-Sense Financial™ Podcast (Forbes Top 10) · Regular contributor, Kiplinger · Featured on KMOX and 97.1 FM Talk<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- AEO ENTITY BLOCK -->\n          <div style=\"border:1px solid #d8c79a;border-radius:8px;background:#faf6ea;padding:22px 24px;margin-top:24px;\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;\">\n              <span style=\"font:700 10px/1.6 ui-monospace,monospace;letter-spacing:.1em;color:#fff;background:#c9a23f;padding:3px 8px;border-radius:3px;\">AEO ADDITION · PASTE VERBATIM<\u002Fspan>\n              <span style=\"font:600 10px/1.4 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#9a7d2e;\">Below photo/video · “Who is Brian Skrobonja?” entity block<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font:400 14px/1.7 system-ui;color:#6a6356;margin:0 0 12px;max-width:80ch;\">Brian Skrobonja is a Certified Private Wealth Advisor (CPWA) and Chartered Financial Consultant (ChFC) with over 30 years of experience in wealth management. He is the founder and president of Skrobonja Financial Group, established in St. Louis, Missouri in 1993. He is the author of three books: Common Sense, Generational Planning, and Retirement Planning. He is the host of the Common-Sense Financial podcast, ranked among the Forbes Top 10 Podcasts by Financial Advisors, and is a regular contributor to Kiplinger magazine. He has been featured on KMOX radio and 97.1 FM Talk in St. Louis. Brian created the WealthSync process, a proprietary three-phase framework for coordinating wealth management across investments, income, taxes, insurance, and estate planning.<\u002Fp>\n            <p style=\"font:500 12px/1.55 system-ui;color:#9a7d2e;margin:0;max-width:80ch;font-style:italic;\">Design note: typeset in a small credentials panel beneath the video or below the bio byline. Must be live crawlable HTML text. Do not place in an image.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= 11 SOCIAL PROOF ================= -->\n  <section id=\"proof\" data-screen-label=\"11 Social
